<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Transcript</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel import-panel">
        <div>
          <h1>Video Transcript</h1>
          <p>Trascrizione, riassunto per punti, archivio e ricerca locale.</p>
        </div>
        <form id="video-form" class="import-form">
          <input id="url" name="url" type="url" placeholder="Link YouTube o VK Video" required />
          <select id="language_hint" name="language_hint">
            <option value="auto">Lingua auto</option>
            <option value="it">Italiano</option>
            <option value="ru">Russo</option>
          </select>
          <button type="submit">Processa</button>
        </form>
        <div id="status" class="status"></div>
        <div id="progress" class="progress" hidden><div class="progress-bar"></div></div>
      </section>

      <section class="toolbar">
        <input id="search" type="search" placeholder="Cerca in metadati, trascrizioni e riassunti" />
        <select id="category-filter">
          <option value="">Tutte le categorie</option>
        </select>
        <button id="open-general-chat" type="button" class="secondary">Chat archivio</button>
        <button id="manage-categories" type="button" class="secondary">Categorie</button>
      </section>

      <section class="content">
        <div id="grid" class="grid"></div>
      </section>

      <dialog id="detail" class="detail-dialog">
        <article class="panel detail"></article>
      </dialog>

      <dialog id="confirm" class="confirm-dialog">
        <article class="panel confirm">
          <h2 class="confirm-title"></h2>
          <div class="confirm-body"></div>
          <div class="confirm-actions">
            <button type="button" class="confirm-cancel" data-cancel>Annulla</button>
            <button type="button" class="confirm-ok" data-ok>Conferma</button>
          </div>
        </article>
      </dialog>

      <dialog id="settings" class="confirm-dialog">
        <article class="panel confirm">
          <h2 class="confirm-title">Impostazioni elaborazione</h2>
          <div class="settings-body"></div>
          <div class="confirm-actions">
            <button type="button" class="confirm-cancel" data-cancel>Annulla</button>
            <button type="button" class="confirm-ok" data-ok>Processa</button>
          </div>
        </article>
      </dialog>

      <dialog id="categories" class="confirm-dialog">
        <article class="panel confirm">
          <h2 class="confirm-title">Categorie</h2>
          <div class="categories-body"></div>
          <div class="confirm-actions">
            <button type="button" class="confirm-cancel" data-cancel>Chiudi</button>
          </div>
        </article>
      </dialog>

      <dialog id="general-chat" class="chat-dialog">
        <article class="panel general-chat-panel">
          <div class="detail-head">
            <h2>Chat sull'archivio</h2>
            <button class="icon-button" type="button" data-cancel aria-label="Chiudi">×</button>
          </div>
          <div class="chat">
            <div class="chat-messages" data-gchat-messages></div>
            <form class="chat-form" data-gchat-form>
              <input class="chat-input" data-gchat-input type="text" autocomplete="off"
                placeholder="Chiedi qualcosa sull'archivio…" />
              <button type="submit">Invia</button>
            </form>
            <div class="gchat-categories" data-gchat-categories></div>
            <div class="chat-actions">
              <button type="button" class="secondary" data-gchat-reset>Reset</button>
            </div>
          </div>
        </article>
      </dialog>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
